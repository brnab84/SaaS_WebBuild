name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The API e2e suite downloads a mongod binary via mongodb-memory-server;
      # cache it so CI is fast and resilient.
      - name: Cache MongoDB binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-memory-server-${{ runner.os }}

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Test (all workspaces)
        run: npm test

      - name: Build editor
        run: npm run build
